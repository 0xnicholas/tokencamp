# Tokencamp v0.2 config
server:
  host: "0.0.0.0"
  port: 3000

auth:
  api_keys:
    - "sk-tc-dev-key-1"
    - "sk-tc-dev-key-2"

router_settings:
  num_retries: 3
  retry_after: 0.5
  allowed_fails: 3
  cooldown_time: 30

redis:
  url: ${REDIS_URL}   # optional, falls back to in-memory cooldown

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: "https://api.deepseek.com"
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: "https://api.anthropic.com"

model_list:
  - model_name: deepseek-chat
    provider: openai
  - model_name: claude-sonnet-4-5
    provider: anthropic
    litellm_params:
      model: claude-sonnet-4-5-20250929
